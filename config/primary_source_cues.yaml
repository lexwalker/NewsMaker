# Phrases in article body that strongly suggest the NEXT link is the primary source.
# Matching is case-insensitive. We look up to ~200 chars after a hit for a URL.

phrases:
  ru:
    - "пресс-релиз"
    - "пресс-служба"
    - "официальный сайт"
    - "сообщает"
    - "как сообщает"
    - "передаёт"
    - "по данным"
    - "по информации"
    - "об этом говорится"
    - "в заявлении"
    - "представила"
    - "объявила"
  en:
    - "press release"
    - "according to"
    - "said in a statement"
    - "announced"
    - "unveiled"
    - "reported"
    - "via"
    - "source:"
  uz:
    - "matbuot xizmati"
    - "rasmiy sayt"
    - "ma'lumot berdi"
    - "xabar qildi"
  kz:
    - "ресми сайт"
    - "баспасөз қызметі"
    - "хабарлайды"

# Mirror / cross-posting hosts. A link to one of these is NOT a primary
# source even if it looks like an external link — usually it's the same
# author reposting their own content (Telegram post → MAX, VK, OK, etc.).
# The primary-source detector filters these out before picking a winner.
mirror_hosts:
  - max.ru
  - t.me
  - telegram.me
  - telegra.ph
  - vk.com
  - vk.ru
  - ok.ru
  - dzen.ru
  - zen.yandex.ru
  - m.ok.ru
  - youtu.be
  - youtube.com
  - instagram.com

# Hosts that are press-release aggregators or brand pressrooms.
