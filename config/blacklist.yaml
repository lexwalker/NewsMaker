# Hard-reject rules collected from the editorial team (Q2, Q3).
# An article that matches ANY rule below gets verdict
# "Точно не новость (чёрный список)" BEFORE any LLM call — pure savings.

# Topic phrases matched case-insensitively inside title + first 1000 chars
# of body. Keep phrases specific enough to avoid false positives
# (e.g. don't just use "bus" — matches "business").
topic_phrases_ru:
  # Q3 — тяжёлый транспорт, спецтехника, сельхозтехника
  - автобус
  - электробус
  - троллейбус
  - трактор
  - комбайн
  - сельхозтехник
  - спецтехник
  - экскаватор
  - бульдозер
  - самосвал
  - карьерный грузовик
  # Q2 — сырьё для батарей (только о ценах/рынке, не о новых технологиях)
  - цены на литий
  - цена на литий
  - цены на кобальт
  - цена кобальта
  - рынок лития
  - рынок кобальта
  # Ольга (группа 6): изменения юр. документов лизинговых компаний — не новость
  - условия лизинга
  - редакции документов
  - общие условия
  # Транспортная инфраструктура (не автопром) — узкие конкретные паттерны,
  # не зацепят легитимные новости.
  - перехватывающая парковк
  - перехватывающие парковк
  - погранперех
  # Корпоративный compliance / ESG documents — не автопром
  - заявление о рабстве
  - торговля людьми
  - modern slavery
  - human trafficking

