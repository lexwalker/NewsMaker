# Canonical sections — must match the 'Разделы новостей' sheet verbatim.
# Refined from editorial answers: Q1/Q2/Q3/Q6/Q7 and group 1-7 examples
# (Ольга, Рита, Д, Эмма).

sections:
  - name: Confirmed
    description: >
      Подтверждённые факты про модель / бренд / производство.
      Сюда: анонсы моделей, старт пред-продаж и продаж, выход бренда на
      рынок, запуски концептов, раскрытие интерьера/экстерьера (скетчи,
      патентные изображения), создание новых брендов, мониторинг модельного
      ряда (новая коробка передач, новая комплектация, версия 4WD), выпуск
      новых модельных годов / рестайлинг, старт нового поколения.
      НЕ сюда: регистрации товарных знаков (они в Local specifics для РФ
      или в Other news для иностранных), акции, промо, дилерские новости,
      отчёты о продажах.

  - name: Local specifics
    description: >
      Новости, привязанные к стране портала (для RU-портала — это РФ):
        • льготные автокредиты, льготный лизинг, утильсбор
        • таможенные пошлины, квоты на импорт ТС в РФ
        • решения Минпромторга / Правительства / Госдумы про авто
        • строительство дорог, регулирование движения в РФ
        • локализация сборки в РФ, новые заводы
        • регистрации товарных знаков В РФ
        • региональные статистики продаж РФ
        • еженедельные отчёты продаж ТС (weekly summary) — только если про РФ
        • импорт ТС в РФ из любой страны
      События в Узбекистане / Казахстане / Беларуси для RU-портала
      обычно идут в Other news, кроме случаев когда идёт импорт ТС в РФ.

  - name: Other news
    description: >
      Всё авто-релевантное, что не попадает в остальные разделы. Сюда:
        • зарядная инфраструктура, АКБ, чипы, ПО (при связи с автобрендом)
        • партнёрства брендов со стартапами / производителями компонентов
        • ЕЖЕМЕСЯЧНЫЕ, квартальные, годовые отчёты продаж по миру / ЕС / Китаю /
          Индии / ЮАР / Австралии / Израилю / странам ближнего зарубежья
        • ACEA "Economic and Market Report", продажи ТС в ЕС (включая LCV)
        • отзывные кампании в зарубежных странах (Transport Canada, NHTSA, …)
        • краш-тесты EuroNCAP / C-NCAP / Global NCAP, Green NCAP press-releases
        • рейтинги JD Power
        • судебные споры, покупка активов, инвестиции в автопром
        • премии брендам (Genesis, Stellantis Accelerator, и т.п.)
        • юбилейные продажи ТС, крупные production milestones (BYD 16M NEV)
        • выставки (кроме крупных моторшоу — те в `Motorshow`)
        • масштабная международная регуляторика (ЕС директивы, US тарифы)
        • регистрации товарных знаков иностранных брендов на иностранных рынках
        • автокредиты в других странах (особенно США EV)
      НЕ сюда: мусор из blacklist.yaml (автобусы, спецтехника, сельхоз,
      цены на литий/кобальт); op-ed и мнения («time to rethink», «paradox of»);
      статистики за период менее месяца.

  - name: Rumors
    description: >
      Непотверждённая информация, утечки, leaks, rumours.
      Маркеры: «по данным источников», «СМИ пишут», «в сети появились рендеры»,
      «ожидается», «может получить», «reportedly», «leak».
      Если бренд официально подтвердил — это Confirmed, не Rumors.

  - name: Economics
    description: >
      Экономика автобизнеса + релевантная макроэкономика:
        • статистика продаж за период МЕСЯЦ и более (AEB, АВТОСТАТ)
        • финансовые отчёты автопроизводителей
        • макро: курсы ЦБ РФ / Мосбиржа / Brent / WTI — постятся регулярно
          после 14:00 (Финмаркет / Интерфакс / Прайм)
        • прогнозы ОПЕК / МАЭ по нефти
        • потребкредиты + автокредиты в одной статье
        • добыча нефти РФ за квартал/год
      НЕ сюда: чистые автокредиты (они в Local specifics), прогнозы
      зарубежных цен (обычно не берём).

  - name: LCV news
    description: >
      ТОЛЬКО лёгкий коммерческий транспорт (LCV, до 3.5 т): фургоны, мелкие
      пикапы, лёгкие грузовики. Модельные новости, дилерские сделки по LCV.
      Автобусы, тяжёлые грузовики, спецтехника и сельхозтехника — НЕ сюда
      (в blacklist). Если новость про новую технологию — `Other news`.

  - name: Test-drive
    description: >
      Развёрнутые обзоры и тест-драйвы моделей (MotorTrend yearlong reviews,
      русские YouTube-обзоры «За рулём»). Помечается как «требует ручной
      проверки» — не публикуется автоматом.

  - name: Dealer news / Promo
    description: >
      Дилерская сеть + маркетинг + акции (три отдельных случая под одной
      крышей):
        • дилерская сеть: открытие / закрытие / расширение шоурумов,
          новые дистрибьюторы, дилерские соглашения, интервью с представителями
          дилерских центров
        • промо: специальные акции с подарками / розыгрышами / условиями
          участия (не обычные скидки для всех клиентов)
        • акции: trade-in программы, специальные условия кредитования
          или рассрочки от бренда
      НЕ сюда: анонсы моделей (Confirmed); мелкая статистика компании
      (< месяца — не публикуется); изменения юридических документов
      (например, «общие условия лизинга»).

  - name: Motorshow
    description: >
      Крупные автосалоны и выставки: Шанхай, Мюнхен, Детройт, CES (auto-часть),
      ММАС, Milan Design Week (авто-экспонаты). Анонсы до начала, репортажи
      с места, подведение итогов.
