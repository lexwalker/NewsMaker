# Canonical sections — must match the 'Разделы новостей' sheet verbatim.
# Descriptions refined from editorial team answers (Q1/Q2/Q3/Q6/Q7).

sections:
  - name: Confirmed
    description: >
      Подтверждённые факты про модель / бренд. Сюда попадают:
        • анонс модели, старт пред-продаж и продаж, выход бренда на рынок
        • запуски концептов, раскрытие интерьера/экстерьера
        • регистрация товарных знаков (в т.ч. в РФ), создание новых брендов
        • патентные изображения
        • EV-модели (например «Nissan представил Juke EV»)
        • мониторинг модельного ряда: изменение комплектации, новая коробка передач,
          новая версия 4WD — даже если это мелкие апдейты, это «факт про модель»
      НЕ сюда: маркетинговые акции (trade-in, скидки, рассрочка), дилерская сеть.

  - name: Local specifics
    description: >
      Новости, привязанные к стране портала (РФ для RU-портала):
        • льготные автокредиты, льготный лизинг, утильсбор
        • таможенные пошлины, квоты на импорт ТС в РФ
        • решения Минпромторга / Правительства / Госдумы про авто
        • строительство дорог, регулирование движения в РФ
        • локализация сборки в РФ, новые заводы
        • региональная статистика продаж в РФ и СНГ
      Узбекистан / Казахстан / Беларусь на RU-портале — как Global или Other news,
      если это не про импорт ТС в РФ.

  - name: Other news
    description: >
      Всё авто-релевантное, что не попадает в остальные разделы:
        • зарядная инфраструктура, АКБ, чипы, ПО (когда связано с автобрендом)
        • партнёрства брендов со стартапами / производителями компонентов
        • крупные судебные споры между брендами
        • покупка / продажа активов, инвестиции
        • отзывные компании брендов в других странах
        • международная регуляторика (ЕС директивы, США тарифы) — масштабные
        • краш-тесты EuroNCAP / C-NCAP, рейтинги JD Power
        • премии, юбилейные продажи ТС
        • выставки (кроме крупных моторшоу — те в `Motorshow`)
        • регулярные отчёты продаж по странам дальнего зарубежья
      НЕ сюда: мусор (см. blacklist.yaml — автобусы, спецтехника, сельхоз, цены на
      литий/кобальт).

  - name: Rumors
    description: >
      Непотверждённая информация, утечки, leaks, rumours.
      Маркеры: «по данным источников», «СМИ пишут», «в сети появились рендеры»,
      «ожидается», «может получить», «reportedly», «leak».
      Если бренд официально подтвердил — это Confirmed, не Rumors.

  - name: Economics
    description: >
      Экономика автобизнеса и макроэкономика, влияющая на авторынок:
        • статистика продаж за период, доли рынка (AEB, АВТОСТАТ)
        • финансовые отчёты автопроизводителей
        • макро: курсы ЦБ РФ / Мосбиржа / Brent / WTI / прогнозы ОПЕК или МАЭ
        • потребкредиты + автокредиты вместе (если только автокредиты —
          это раздел `Local specifics`)
        • добыча нефти в РФ за квартал/год (но не просто импорт/экспорт нефти)

  - name: LCV news
    description: >
      ТОЛЬКО лёгкий коммерческий транспорт (LCV, до 3.5 т): фургоны, мелкие пикапы,
      лёгкие грузовики. Модельные новости, дилерские сделки по LCV.
      Автобусы, тяжёлые грузовики, спецтехника и сельхозтехника сюда НЕ идут —
      они попадают в blacklist (editor decision).

  - name: Test-drive
    description: >
      Развёрнутые обзоры и тест-драйвы моделей (MotorTrend yearlong reviews,
      русские ютуб-обзоры вроде «За рулём»). Редакция помечает это как
      «требует ручной проверки» — автоматом не публикуется.

  - name: Dealer news / Promo
    description: >
      Дилерская сеть + промо-активности и акции:
        • открытие / закрытие / расширение шоурумов и дилерских сетей
        • интервью с представителями дилерских центров
        • дилерские соглашения, новые дистрибьюторы
        • промо-акции с подарками, розыгрышами, условиями участия
        • trade-in программы, специальные условия кредитования / рассрочки
        • сезонные акции на конкретные модели
      Короткий критерий — если событие касается дилерской сети ИЛИ маркетинговой
      активности бренда (а не самой модели) — сюда.

  - name: Motorshow
    description: >
      Крупные автосалоны и выставки: Шанхай, Мюнхен, Детройт, CES (auto-часть),
      ММАС. Анонсы до начала, репортажи с места, подведение итогов.
