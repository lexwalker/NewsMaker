# Canonical sections — taken verbatim from the 'Разделы новостей' sheet tab
# and cross-validated against 2989 published news rows in
# 'Новости опубликованные'. Editors may edit descriptions here; the `name`
# field must match the sheet exactly (it is used verbatim when writing rows).

sections:
  - name: Confirmed
    description: >
      Подтверждённые факты — официальные анонсы, премьеры, запуски продаж,
      изменения модельного ряда, отзывные кампании, сертификации.
      Есть конкретное событие + официальный источник (пресс-релиз бренда /
      tass / kommersant / autostat). Используется ЧАЩЕ ВСЕГО (~25% всех новостей).

  - name: Local specifics
    description: >
      Новости про конкретный региональный рынок (РФ / Казахстан / Узбекистан):
      локализация сборки, программы господдержки автопрома, утильсбор,
      таможенные пошлины, регистрации, решения Минпромторга / Росстата,
      региональные запуски моделей. Если событие привязано к стране портала —
      сюда.

  - name: Other news
    description: >
      Автомобильные новости, не укладывающиеся в другие разделы — смежные темы
      (технологии, автокомпоненты, инфраструктура зарядок, аккумуляторы,
      беспилотники), мировые события без привязки к одному рынку.

  - name: Rumors
    description: >
      Слухи, утечки, "insiders say", неподтверждённая информация.
      Маркеры: "по данным источников", "СМИ пишут", "в сети появились фото",
      "ожидается", "может получить". Не используй этот раздел для фактов,
      которые уже подтверждены брендом.

  - name: Economics
    description: >
      Экономика авторынка — статистика продаж за период, доли рынка, данные
      AEB / АВТОСТАТ / Автотрасса, финансовые отчёты автопроизводителей,
      макроэкономика, напрямую влияющая на авторынок (ставка, курс, цены
      на сырьё, квоты, санкции).

  - name: LCV news
    description: >
      Лёгкий коммерческий транспорт — фургоны, пикапы, лёгкие грузовики
      до 3.5 тонн. Новости моделей LCV, флитовые сделки, регулирование
      коммерческого сегмента, такси-парки.

  - name: Test-drive
    description: >
      Обзоры, тест-драйвы, сравнительные тесты моделей. ВАЖНО: этот раздел
      помечается как «требует ручной проверки редактора» — бот НЕ публикует
      такие новости автоматически, а оставляет на контроль редактора.

  - name: Dealer news / Promo
    description: >
      Дилерская сеть — открытия / закрытия / переезд салонов, новые дилерские
      соглашения, региональное расширение сети. Плюс промо-активности брендов:
      trade-in, 0% рассрочка, специальные условия кредитования, купоны.

  - name: Motorshow
    description: >
      Автосалоны, выставки, автошоу, индустриальные конференции — анонсы
      до начала, репортажи с места, подведение итогов. Шанхай, Мюнхен,
      Детройт, CES, ММАС и т.п.
