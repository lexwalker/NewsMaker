# Per-domain HTTP quirks — whitelisted workarounds for broken servers.
#
# `ssl_insecure`:  skip TLS verification. Ok ONLY for news/PR sites we just
#                  READ HTML from. Never add a domain here that we submit
#                  credentials to.
#
# `url_rewrites`:  map an old source URL (the one listed in the Google Sheet)
#                  to its current canonical location. Prefer updating the
#                  sheet long-term; this is a quick-win patch.

ssl_insecure:
  # Sites with expired / broken cert chains that respond fine once we
  # skip verification. Verified via smoke test.
  #   autoins.ru  — Russian auto insurer PR feed
  #   kianewscenter.com  — Kia global PR
  #   vwpress.co.uk  — VW UK press site
  - autoins.ru
  - www.kianewscenter.com
  - kianewscenter.com
  - vwpress.co.uk

  # NOTE: the following hosts also error on SSL but with
  #   UNEXPECTED_EOF_WHILE_READING — that's not a cert problem, the server
  #   is cutting the TLS stream (most likely geo-IP block or anti-bot WAF).
  #   Adding them here does nothing; they need a residential proxy.
  #     portal.elpts.ru
  #     infiniti-now.ru
  #     www.infiniti.ru
  #     press.skoda-avto.ru
  #     roskazna.gov.ru   (also 20s timeout — geo-blocked)

url_rewrites:
  # Old sheet URL -> live URL. Applied at fetch time.
  "https://www.uber.com/en-GB/newsroom/news/": "https://www.uber.com/newsroom/"
  # NOTE: gazgroup.ru/news/ returns 404 on all subpaths we tried; needs a
  # fresh URL from the editor. Leaving unrewritten until we get one.

# Domains that require curl_cffi (Chrome JA3/JA4 TLS impersonation).
# Use this when the server rejects httpx at the TLS layer but serves static
# HTML once past the gate. Much faster than Playwright (no browser).
#
# Verified via smoke test on 2026-04-22 (all returned 200 with real body):
impersonate_domains:
  - www.nhtsa.gov
  - nhtsa.gov
  - www.media.volvocars.com
  - media.volvocars.com
  - www.tuvsud.com
  - tuvsud.com
  - www.stellantis.com
  - hondanews.com
  - int-media.citroen.com
  - int-media.peugeot.com
  - int-media.dsautomobiles.com
  - iz.ru
  - www.iz.ru
  - auto.ru
  - media.mitsubishicars.com
  - corporate.ferrari.com       # we get 403 here, but retry-path will try PW next
  - www.ferrari.com
  - investor.uber.com

# Domains that require Playwright (headless Chromium) instead of httpx.
# Use this only when either:
#   a) the site is a JS-only SPA that needs an actual JS engine to
#      populate the DOM (no amount of TLS impersonation will help), OR
#   b) there's a JS challenge page that must be solved before content
#      is served.
#
# Playwright is ~10× slower than curl_cffi. When both work, keep the
# domain in ``impersonate_domains`` only.
playwright_domains:
  # Cloudflare JS challenge — verified that curl_cffi is not enough
  - jdpower.com
  - www.jdpower.com
  - tass.ru
  - pressroom.toyota.com
  - pressroom.lexus.com
  - cleantechnica.com
  - fleetnews.co.uk
  - media.mbusa.com
  - uk.nissannews.com
  - me.nissanmotornews.com
  - usa.nissannews.com
  - omodaauto.co.uk

  # JS-rendered SPA OEM press rooms
  - media.vw.com
  - www.hyundainews.com
  - media.mercedes-benz.com
  - media.renaultgroup.com
  - media.jaguar.com
  - media.stellantisnorthamerica.com
  - www.globalsuzuki.com
  - en.kg-mobility.com
  - www.polestar.com
  - ir.zeekrgroup.com
  - www.genesisnewseurope.com
  - media.lamborghini.com

  # NOTE: these hosts returned 403 from Playwright even with stealth —
  # they combine JS challenge with IP-reputation checks (datacenter IPs
  # pre-flagged). Would need residential proxy to rescue. Listed here as
  # a rationale record, NOT active:
